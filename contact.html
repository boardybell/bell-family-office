<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Bell Family Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #1a1714; }
    .wrap { position: relative; }
    .wrap img { width: 100%; display: block; }
    .overlay {
      position: absolute;
      top: 37%;
      left: 0;
      width: 100%;
      height: 36%;
      background: #3a4248;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75em;
    }
    .overlay p {
      margin: 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #c9a96e;
    }
    .overlay a {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      color: #c9a96e;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="contact.png" alt="Bell Family Office" />
    <div class="overlay">
      <p>For inquiries, please reach us directly.</p>
      <a href="mailto:externalinquiries@bellfamilyoffice.com">externalinquiries@bellfamilyoffice.com</a>
    </div>
  </div>
</body>
</html>
