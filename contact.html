<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Bell Family Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #1a1714; }
    .wrap { position: relative; }
    .wrap img { width: 100%; display: block; }
    .overlay {
      position: absolute;
      top: 37%;
      left: 0;
      width: 100%;
      height: 36%;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75em;
    }
    .overlay p {
      margin: 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3.8vw, 2.4rem);
      color: #c9a96e;
    }
    .overlay .tagline {
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      font-style: normal;
      letter-spacing: 0.18em;
      color: #9e7d4e;
    }
    .overlay a {
      font-family: 'Cormorant SC', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.25rem, 3.4vw, 2.15rem);
      color: #c9a96e;
      text-decoration: none;
    }
    .overlay a:hover { color: #dfc08a; }
    area { outline: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="contact.png" alt="Bell Family Office" usemap="#homelink" />
    <div class="overlay">
      <p class="tagline">Silentio et Aeternum.</p>
      <p>For inquiries, please reach us directly.</p>
      <a href="mailto:externalinquiries@bellfamilyoffice.com">externalinquiries@bellfamilyoffice.com</a>
      <!-- Phone: [placeholder] -->
    </div>
  </div>
  <map name="homelink">
    <area shape="rect" coords="0,0,1024,538" href="index.html" alt="Bell Family Office — Home" />
  </map>
</body>
</html>
