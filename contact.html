        <rect x="17" y="36" width="10" height="3" rx="1" />
        <rect x="17" y="33" width="2" height="4" rx="1" />
        <rect x="21" y="32" width="2" height="5" rx="1" />
        <rect x="25" y="33" width="2" height="4" rx="1" />
      </g>

      <!-- Right lion (mirror, facing left) -->
      <g fill="#c9a96e" transform="translate(110,0) scale(-1,1)">
        <ellipse cx="18" cy="62" rx="9" ry="13" transform="rotate(-15 18 62)" />
        <circle cx="22" cy="44" r="7" />
        <ellipse cx="22" cy="43" rx="9.5" ry="9" fill="none" stroke="#c9a96e" stroke-width="3" />
        <path d="M9 70 Q2 60 6 50 Q8 46 11 50" fill="none" stroke="#c9a96e" stroke-width="2.5" stroke-linecap="round"/>

        <circle cx="33" cy="49" r="2.5" />

        <rect x="21" y="32" width="2" height="5" rx="1" />
        <rect x="25" y="33" width="2" height="4" rx="1" />
      </g>

      <!-- Central shield -->
      <path d="M40 35 L70 35 L70 72 Q55 82 40 72 Z" fill="#1a1714" stroke="#c9a96e" stroke-width="2" />
      <!-- Bell on shield -->
      <g fill="#c9a96e" transform="translate(47, 43)">

      <path d="M25 95 Q55 103 85 95" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.5" />
